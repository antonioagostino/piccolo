training:
  data_dir: ./data
  model_config: ./configs/model.yaml
  tokenizer_encoding: cl100k_base
  train_split_size: 0.9
  batch_size: 8
  learning_rate: 0.0003
  min_learning_rate: 0.00003
  lr_warmup_iterations: 500
  max_iterations: 193968
  weight_decay: 0.01
  max_grad_norm: 1.0
  device: auto
  compile_model: false
  gradient_checkpointing: true
  seed: 42
  log_every_tokens: 2048
  val_every_iterations: 500
  checkpoint_dir: ./checkpoints
  wandb:
    enabled: true
    project: friendsbot
    run_name: friendsbot-run-1
    mode: online
